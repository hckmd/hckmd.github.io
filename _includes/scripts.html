<script data-turbo-eval="false" src="{{ site.baseurl | append: '/js/jquery.min.js' }}"></script>
<script data-turbo-eval="false" src="{{ site.baseurl | append: '/js/bootstrap.bundle.min.js' }}"></script>

<script data-turbo-eval="false">
    window.addEventListener("scroll", function () {
        let mybutton = document.getElementById("btn-back-to-top");
        if (!mybutton) return;

        if (
            document.body.scrollTop > 100 ||
            document.documentElement.scrollTop > 100
        ) {
            mybutton.style.display = "block";
        } else {
            mybutton.style.display = "none";
        }
    });

    document.addEventListener("click", function (e) {
        let mybutton = e.target.closest("#btn-back-to-top");
        if (mybutton) {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
            // Move focus to top
            let main = document.querySelector('main');
            if (main) {
                main.focus();
            }
        }
    });

    // Reset Bootstrap collapse elements before Turbo caches the page
    document.addEventListener("turbo:before-cache", function () {
        document.querySelectorAll('.collapse.show').forEach(function(el) {
            el.classList.remove('show');
        });
        document.querySelectorAll('button[data-bs-toggle="collapse"]').forEach(function(btn) {
            btn.classList.add('collapsed');
            btn.setAttribute('aria-expanded', 'false');
        });
    });
</script>
